<style>
	/* Page-local layout glue only - cards, tables, titles, scroll and widths
	   are handled centrally by alpinos_pages.css. No apostrophes in this file. */
	.post-delivery-queue .pdq-fld-col {
		margin-bottom: 10px;
	}
	.post-delivery-queue .pdq-list-header {
		justify-content: space-between;
		margin-bottom: 12px;
	}
	@media (max-width: 768px) {
		.post-delivery-queue .pdq-count {
			flex-basis: 100%;
		}
		/* long btn-xs labels (Start Post Delivery) get a usable tap target */
		.post-delivery-queue .pdq-start-btn,
		.post-delivery-queue .pdq-open-btn {
			min-height: 30px;
			padding: 4px 10px;
		}
	}

<div class="post-delivery-queue">
	<div class="alp-card pdq-filters-card">

			<div class="col-md-2 col-sm-6 pdq-fld-col"><div class="fld-status"></div></div>

		</div>

			<button type="button" class="btn btn-primary btn-sm btn-pdq-apply">Apply</button>
			<button type="button" class="btn btn-default btn-sm btn-pdq-clear">Clear</button>
		</div>
	</div>

		<div class="alp-actions pdq-list-header">
			<span class="text-muted pdq-count"></span>
			<div class="alp-actions pdq-pager">
				<button type="button" class="btn btn-default btn-sm btn-pdq-prev" disabled>Previous</button>
