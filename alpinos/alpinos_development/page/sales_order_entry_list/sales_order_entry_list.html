<div class="sales-order-entry-list">
	<style>
		/* Page-local layout only. Card look, table skin, section titles and the
		   full-width kill all come from the central alpinos_pages.css. */
		.sales-order-entry-list .so-list-filters-head {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 8px;
			flex-wrap: wrap;
		}
		.sales-order-entry-list .so-list-filters.so-list-filters-collapsed .so-list-filters-body {
			display: none;
		}
		.sales-order-entry-list .so-list-table-head {
			display: flex;
			justify-content: space-between;
			align-items: center;
			flex-wrap: wrap;
			gap: 8px;
			margin-bottom: 10px;
		}
		.sales-order-entry-list .so-list-filters-body .row > [class*="col-"] {
			margin-bottom: 10px;
		}
		@media (min-width: 769px) {
			/* Filter collapse is a phone-only affordance. */
			.sales-order-entry-list .btn-so-list-toggle-filters {
				display: none;
			}
		}
	</style>

	<div class="so-list-filters so-view-card">
		<div class="so-list-filters-head">
			<h6 class="so-list-filters-title">Filters</h6>
			<button type="button" class="btn btn-default btn-xs btn-so-list-toggle-filters" aria-expanded="true">Hide Filters</button>
		</div>
		<div class="so-list-filters-body">
			<div class="row">
				<div class="col-md-3 col-sm-6">
					<div class="fld-search"></div>
				</div>
				<div class="col-md-2 col-sm-6">
					<div class="fld-status"></div>
				</div>
				<div class="col-md-2 col-sm-6">
					<div class="fld-workflow-status"></div>
				</div>
				<div class="col-md-2 col-sm-6">
					<div class="fld-company"></div>
				</div>
				<div class="col-md-2 col-sm-6">
					<div class="fld-customer"></div>
				</div>
				<div class="col-md-2 col-sm-6">
					<div class="fld-from-date"></div>
				</div>
				<div class="col-md-2 col-sm-6">
					<div class="fld-to-date"></div>
				</div>
				<div class="col-md-2 col-sm-6">
					<div class="fld-au-damage-filter"></div>
				</div>
			</div>
			<div class="alp-actions">
				<button type="button" class="btn btn-primary btn-sm btn-so-list-apply">Apply</button>
				<button type="button" class="btn btn-default btn-sm btn-so-list-clear">Clear</button>
			</div>
		</div>
	</div>

	<div class="so-view-card so-list-table-card">
		<div class="so-list-table-head">
			<span class="text-muted so-list-count"></span>
			<div class="alp-actions">
				<select class="form-control input-xs so-list-page-length" title="Rows per page" style="width: auto; display: inline-block;">
					<option value="20" selected>20</option>
					<option value="50">50</option>
					<option value="100">100</option>
				</select>
				<button type="button" class="btn btn-default btn-sm btn-so-list-prev" disabled>Previous</button>
				<button type="button" class="btn btn-default btn-sm btn-so-list-next" disabled>Next</button>
			</div>
		</div>
		<div class="alp-scroll alp-scroll--wide">
			<table class="table table-bordered so-list-table">
				<thead>
					<!-- Header is rendered by JS: columns depend on user role
					     (Sales vs Warehouse layouts). -->
					<tr></tr>
				</thead>
				<tbody></tbody>
			</table>
		</div>
	</div>
</div>
