<style>
.obi-page { padding: 16px; }
.obi-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
.obi-header-left { display:flex; align-items:center; gap:10px; }
.obi-title { margin:0; font-size:16px; font-weight:600; }
.obi-subtitle { font-size:12px; color:#888; margin:0; }
.obi-header-right { display:flex; gap:6px; align-items:center; }
.obi-filters { display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap; align-items:center; }
.obi-search { flex:1; min-width:180px; }
.obi-group-filter { flex:0 0 200px; }
.obi-filter-counts { font-size:12px; color:#888; white-space:nowrap; }
.obi-bulk-bar { display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:13px;
  background:#f8f9fa; border:1px solid #e2e8f0; border-radius:4px; padding:6px 10px; }
.obi-bulk-bar .form-control { width:110px; }
.obi-table-wrap { overflow-x:auto; max-height:calc(100vh - 310px); overflow-y:auto;
  border:1px solid #e0e0e0; border-radius:4px; }
.obi-table { margin:0; width:100%; }
.obi-table thead th { position:sticky; top:0; background:#fff; z-index:2;
  font-size:12px; white-space:nowrap; border-bottom:2px solid #dee2e6 !important; }
.obi-table tbody tr:hover td { background:#f0f4ff; }
.obi-table tr.obi-selected td { background:#f0fff4; }
.obi-table .form-control { padding:2px 6px; height:26px; font-size:12px; }
.col-chk  { width:32px; text-align:center; }
.col-no   { width:40px; text-align:right; color:#aaa; font-size:11px; }
.col-code { width:140px; font-family:monospace; font-size:12px; }
.col-name { min-width:200px; }
.col-group{ width:150px; font-size:12px; color:#666; }
.col-mrp,.col-margin,.col-rate { width:130px; }
.obi-footer { margin-top:8px; min-height:20px; display:flex; align-items:center; gap:12px; }
.obi-status { font-size:12px; color:#888; }
.obi-dirty-badge { display:none; font-size:11px; background:#fff3cd; color:#856404;
  border:1px solid #ffc107; border-radius:3px; padding:1px 6px; }
</style>

<div class="obi-page">

  <!-- Header -->
  <div class="obi-header">
    <div class="obi-header-left">
      <div>
        <h4 class="obi-title">Offline Buyer Items</h4>
        <p class="obi-subtitle">Single master — changes apply globally</p>
      </div>
    </div>
    <div class="obi-header-right">
      <span class="obi-dirty-badge">Unsaved changes</span>
      <button class="btn btn-sm btn-default obi-btn-select-all">Select All</button>
      <button class="btn btn-sm btn-default obi-btn-deselect-all">Deselect All</button>
      <button class="btn btn-sm btn-primary obi-btn-save">Save</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="obi-filters">
    <input type="text" class="form-control obi-search"
           placeholder="Search by Item Code or Name…" />
    <select class="form-control obi-group-filter">
      <option value="">All Item Groups</option>
    </select>
    <div class="obi-filter-counts">
      <span class="obi-total-count"></span>
      &nbsp;|&nbsp; selected: <span class="obi-selected-count">0</span>
    </div>
  </div>

  <!-- Bulk apply shortcut -->
  <div class="obi-bulk-bar">
    <span>Apply to selected →</span>
    <input type="number" class="form-control obi-bulk-mrp"    placeholder="MRP"      min="0" step="0.01" />
    <input type="number" class="form-control obi-bulk-margin" placeholder="Margin %" min="0" max="100" step="0.01" />
    <button class="btn btn-xs btn-default obi-btn-apply-bulk">Apply</button>
  </div>

  <!-- Table -->
  <div class="obi-table-wrap">
    <table class="obi-table table table-bordered table-condensed">
      <thead>
        <tr>
          <th class="col-chk">
            <input type="checkbox" class="obi-chk-all" title="Select / deselect all visible" />
          </th>
          <th class="col-no">No.</th>
          <th class="col-code">Item Code</th>
          <th class="col-name">Item Name</th>
          <th class="col-group">Item Group</th>
          <th class="col-mrp">MRP (₹)</th>
          <th class="col-margin">Margin %</th>
          <th class="col-rate">Selling Rate (₹)</th>
        </tr>
      </thead>
      <tbody class="obi-tbody"></tbody>
    </table>
  </div>

  <div class="obi-footer">
    <span class="obi-status text-muted"></span>
  </div>

</div>
