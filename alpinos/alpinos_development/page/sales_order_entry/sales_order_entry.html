<div class="sales-order-entry" style="max-width: 1200px; margin: 0 auto; padding: 15px;">

	<!-- Header Fields -->
	<div class="so-header" style="background: var(--card-bg); border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border-color);">
		<div class="row">
			<div class="col-md-3 field-customer"></div>
			<div class="col-md-3 field-order-type"></div>
			<div class="col-md-3 field-delivery-date"></div>
			<div class="col-md-3 field-company"></div>
		</div>
	</div>

	<!-- Items Table -->
	<div style="background: var(--card-bg); border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border-color);">
		<h5 style="margin-bottom: 15px; font-weight: 600;">Items</h5>
		<div style="overflow-x: auto;">
			<table class="table table-bordered items-table" style="font-size: 13px;">
				<thead style="background: var(--bg-color);">
					<tr>
						<th style="width: 40px;">#</th>
						<th style="min-width: 140px;">SKU</th>
						<th style="min-width: 120px;">SKU No.</th>
						<th style="width: 80px;">Qty</th>
						<th style="width: 80px;">Box</th>
						<th style="width: 100px;">MRP</th>
						<th style="width: 90px;">Flat Disc.</th>
						<th style="width: 90px;">Offer</th>
						<th style="width: 90px;">Add. Disc.</th>
						<th style="width: 90px;">Tax</th>
						<th style="width: 100px;">Amount</th>
						<th style="width: 40px;"></th>
					</tr>
				</thead>
				<tbody></tbody>
			</table>
		</div>
		<button class="btn btn-sm btn-light btn-add-row" style="margin-top: 5px;">
			<i class="fa fa-plus"></i> Add Row
		</button>
	</div>

	<!-- Other Details Section -->
	<div class="other-details-section" style="background: var(--card-bg); border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border-color);">
		<div class="row">
			<div class="col-md-6">
				<h5 style="margin-bottom: 15px; font-weight: 600;">Cash Discount</h5>
				<div class="field-cash-discount"></div>
			</div>
			<div class="col-md-6">
				<div class="field-additional-units-damage" style="margin-top: 30px;"></div>
			</div>
		</div>

		<!-- Marketing Freebies -->
		<div style="margin-top: 20px;">
			<h5 style="margin-bottom: 10px; font-weight: 600;">Marketing Freebies</h5>
			<table class="table table-bordered freebies-table" style="font-size: 13px;">
				<thead style="background: var(--bg-color);">
					<tr>
						<th style="min-width: 140px;">Item</th>
						<th>Item Name</th>
						<th style="width: 80px;">Qty</th>
						<th>Remarks</th>
						<th style="width: 40px;"></th>
					</tr>
				</thead>
				<tbody></tbody>
			</table>
			<button class="btn btn-sm btn-light btn-add-freebie">
				<i class="fa fa-plus"></i> Add Freebie
			</button>
		</div>

		<!-- Scheme Items (conditional) -->
		<div class="scheme-items-section" style="margin-top: 20px; display: none;">
			<h5 style="margin-bottom: 10px; font-weight: 600;">Scheme Items</h5>
			<table class="table table-bordered scheme-table" style="font-size: 13px;">
				<thead style="background: var(--bg-color);">
					<tr>
						<th style="min-width: 140px;">SKU</th>
						<th>SKU No.</th>
						<th style="width: 80px;">Qty</th>
						<th>Scheme</th>
						<th style="width: 40px;"></th>
					</tr>
				</thead>
				<tbody></tbody>
			</table>
			<button class="btn btn-sm btn-light btn-add-scheme">
				<i class="fa fa-plus"></i> Add Scheme Item
			</button>
		</div>
	</div>

	<!-- Totals -->
	<div style="background: var(--card-bg); border-radius: 8px; padding: 20px; border: 1px solid var(--border-color);">
		<div class="row">
			<div class="col-md-6"></div>
			<div class="col-md-6">
				<table class="table" style="font-size: 14px;">
					<tr>
						<td class="text-right" style="border: none;"><strong>Total Qty:</strong></td>
						<td class="text-right total-qty" style="border: none; font-weight: 600;">0</td>
					</tr>
					<tr>
						<td class="text-right" style="border: none;"><strong>Total Amount:</strong></td>
						<td class="text-right total-amount" style="border: none; font-weight: 600;">0.00</td>
					</tr>
					<tr>
						<td class="text-right" style="border: none;"><strong>Cash Discount:</strong></td>
						<td class="text-right cash-disc-amount" style="border: none; color: var(--red-500);">0.00</td>
					</tr>
					<tr style="font-size: 16px;">
						<td class="text-right" style="border-top: 2px solid var(--border-color);"><strong>Grand Total:</strong></td>
						<td class="text-right grand-total" style="border-top: 2px solid var(--border-color); font-weight: 700; color: var(--primary);">0.00</td>
					</tr>
				</table>
			</div>
		</div>
	</div>

</div>
