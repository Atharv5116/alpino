<style>
	.pick-list-container {
		padding: 15px;
		background: #fff;
	}
	.pl-actions {
		display: flex;
		flex-wrap: wrap;
		gap: 6px;
		justify-content: flex-end;
		margin-bottom: 15px;
	}
	.pl-grid {
		display: grid;
		grid-template-columns: 1fr 1fr;
		gap: 12px 18px;
		margin-bottom: 20px;
	}
	.pl-col {
		display: flex;
		flex-direction: column;
		gap: 10px;
		min-width: 0;
	}
	.pl-field {
		display: grid;
		grid-template-columns: 130px 1fr;
		gap: 6px;
		align-items: center;
	}
	.pl-field label {
		font-weight: 600;
		font-size: 12px;
		margin: 0;
		text-align: right;
	}
	.pl-field input,
	.pl-field select,
	.pl-field textarea {
		width: 100%;
		min-width: 0;
		box-sizing: border-box;
	}
	.sku-table {
		width: 100%;
		border-collapse: collapse;
		margin-bottom: 20px;
	}
	.sku-table th, .sku-table td {
		border: 1px solid #d1d8dd;
		padding: 5px;
		text-align: center;
	}
	.sku-table th {
		background: #f8f9fa;
		font-weight: bold;
	}
	.sku-table input {
		width: 100%;
		box-sizing: border-box;
	}
	.table-section-title {
		margin-top: 30px;
		margin-bottom: 10px;
		font-size: 16px;
		font-weight: bold;
		color: #333;
		border-bottom: 1px solid #ddd;
		padding-bottom: 5px;
	}
	#tables-container {
		width: 100%;
		overflow-x: auto;
		-webkit-overflow-scrolling: touch;
	}
	#tables-container .sku-table {
		min-width: 720px;
	}
	.row-actions-cell {
		white-space: nowrap;
		min-width: 64px;
		padding: 4px 6px !important;
	}
	.alpinos-row-icon-btn {
		display: inline-flex;
		align-items: center;
		justify-content: center;
		width: 24px;
		height: 24px;
		padding: 0;
		margin: 0 1px;
		border: none;
		background: transparent;
		color: #6b7280;
		border-radius: 4px;
		cursor: pointer;
		transition: background-color .12s ease-in-out, color .12s ease-in-out;
	}
	.alpinos-row-icon-btn .fa {
		font-size: 12px;
		line-height: 1;
	}
	.alpinos-row-icon-btn:hover {
		background: #f1f5f9;
		color: #111827;
	}
	.alpinos-row-icon-btn:focus {
		outline: 2px solid #cbd5e1;
		outline-offset: 1px;
	}
	.alpinos-row-icon-danger {
		color: #b91c1c;
	}
	.alpinos-row-icon-danger:hover {
		background: #fef2f2;
		color: #7f1d1d;
	}

	/* Page-level action buttons (Go to List View / Create Delivery Note). */
	.pl-actions .btn {
		display: inline-flex;
		align-items: center;
		gap: 6px;
		padding: 5px 12px;
		font-size: 12px;
		font-weight: 500;
		line-height: 1.4;
		border-radius: 6px;
		border: 1px solid #d1d8dd;
		background: #fff;
		color: #374151;
		transition: all .12s ease-in-out;
		box-shadow: 0 1px 0 rgba(0,0,0,0.02);
	}
	.pl-actions .btn:hover {
		background: #f1f5f9;
		border-color: #94a3b8;
		color: #111827;
	}
	.pl-actions .btn.btn-primary {
		background: #111827;
		border-color: #111827;
		color: #fff;
	}
	.pl-actions .btn.btn-primary:hover {
		background: #1f2937;
		border-color: #1f2937;
	}

	/* Tablet narrow */
	@media (max-width: 720px) {
		.pl-field {
			grid-template-columns: 110px 1fr;
		}
		.pl-field label {
			font-size: 11px;
		}
	}

	/* Phone — keep 2 outer columns; stack label on top of input inside each cell */
	@media (max-width: 480px) {
		.pick-list-container {
			padding: 8px;
		}
		.pl-grid {
			gap: 10px 10px;
		}
		.pl-field {
			grid-template-columns: 1fr;
			gap: 2px;
		}
		.pl-field label {
			text-align: left;
			font-size: 11px;
		}
		.pl-field input,
		.pl-field select {
			font-size: 13px;
			padding: 4px 6px;
			height: 30px;
		}
	}
</style>

<div class="pick-list-container">
	<div class="pl-actions">
		<button class="btn btn-default btn-sm" id="btn-save-draft" style="display: none;">Save as Draft</button>
		<button class="btn btn-default btn-sm" id="btn-save-draft-update" style="display: none;">Save</button>
		<button class="btn btn-default btn-sm" id="btn-generate-sticker" style="display: none;">Generate Sticker</button>
		<button class="btn btn-primary btn-sm" id="btn-create-delivery-note" style="display: none;">Create Delivery Note</button>
		<button class="btn btn-default btn-sm" id="btn-go-to-list">Go to List View</button>
	</div>

	<div class="pl-grid">
		<!-- Left column -->
		<div class="pl-col">
			<div class="pl-field">
				<label>Assigned To</label>
				<select class="form-control" data-fieldname="custom_assigned_to"></select>
			</div>
			<div class="pl-field">
				<label>QC Attended By</label>
				<select class="form-control" data-fieldname="custom_qc_attended_by"></select>
			</div>
			<div class="pl-field">
				<label>SO Date</label>
				<input type="text" class="form-control" data-fieldname="custom_order_date" readonly>
			</div>
			<div class="pl-field">
				<label>Party Name</label>
				<input type="text" class="form-control" data-fieldname="custom_customer_name" readonly>
			</div>
			<div class="pl-field">
				<label>Party Code</label>
				<input type="text" class="form-control" data-fieldname="custom_party_code" readonly>
			</div>
			<div class="pl-field">
				<label>SO NO.</label>
				<input type="text" class="form-control" data-fieldname="custom_sales_order_id" readonly>
			</div>
			<div class="pl-field">
				<label>PO NO.</label>
				<input type="text" class="form-control" data-fieldname="custom_po_no">
			</div>
			<div class="pl-field">
				<label>Transporter</label>
				<input type="text" class="form-control" data-fieldname="custom_transporter">
			</div>
		</div>

		<!-- Right column -->
		<div class="pl-col">
			<div class="pl-field">
				<label>Actual Box</label>
				<input type="number" class="form-control" data-fieldname="custom_actual_box" step="1">
			</div>
			<div class="pl-field">
				<label>Sample Box</label>
				<input type="number" class="form-control" data-fieldname="custom_sample_box" step="1">
			</div>
			<div class="pl-field">
				<label>Total Box</label>
				<input type="number" class="form-control" data-fieldname="custom_total_box" step="1" readonly>
			</div>
			<div class="pl-field">
				<label>Sample Weight</label>
				<input type="number" class="form-control" data-fieldname="custom_sample_weight" step="0.01" readonly>
			</div>
			<div class="pl-field">
				<label>Gross Weight</label>
				<input type="number" class="form-control" data-fieldname="custom_gross_weight" step="0.01" readonly>
			</div>
			<div class="pl-field">
				<label>Total Units</label>
				<input type="number" class="form-control" data-fieldname="custom_total_unit" step="0.01" readonly>
			</div>
			<div class="pl-field">
				<label>Dispatch Date</label>
				<input type="date" class="form-control" data-fieldname="custom_dispatch_date">
			</div>
		</div>
	</div>

	<div id="tables-container">
		<!-- Tables will be dynamically generated here -->
	</div>

	<datalist id="batch-list"></datalist>
</div>
