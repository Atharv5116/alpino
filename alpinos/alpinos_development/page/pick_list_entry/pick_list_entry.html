<style>
	.pick-list-container {
		padding: 15px;
		background: var(--card-bg, #fff);
	}
	.pl-actions {
		display: flex;
		flex-wrap: wrap;
		gap: 8px;
		justify-content: flex-end;
		margin-bottom: 15px;
	}
	.pl-grid {
		display: grid;
		grid-template-columns: 1fr 1fr;
		gap: 12px 18px;
		margin-bottom: 20px;
	}
	.pl-col {
		display: flex;
		flex-direction: column;
		gap: 10px;
		min-width: 0;
	}
	.pl-field {
		display: grid;
		grid-template-columns: 130px 1fr;
		gap: 6px;
		align-items: center;
	}
	.pl-field label {
		font-weight: 600;
		font-size: 12px;
		margin: 0;
		text-align: right;
	}
	.pl-field input,
	.pl-field select,
	.pl-field textarea {
		width: 100%;
		min-width: 0;
		box-sizing: border-box;
	}
	.sku-table {
		width: 100%;
		border-collapse: collapse;
	}
	.sku-table th, .sku-table td {
		border: 1px solid var(--border-color, #d1d8dd);
		padding: 5px;
		text-align: center;
	}
	.sku-table input {
		width: 100%;
		box-sizing: border-box;
	}
	/* Section spacing lives on the scroll wrapper so the horizontal
	   scrollbar hugs each table. Header look + section titles come from
	   the central alpinos_pages.css design system. */
	.sku-table-wrapper {
		margin-bottom: 20px;
	}
	#tables-container {
		width: 100%;
		overflow-x: auto;
		-webkit-overflow-scrolling: touch;
	}
	#tables-container .sku-table {
		min-width: 900px;
	}
	.row-actions-cell {
		white-space: nowrap;
		min-width: 64px;
		padding: 4px 6px !important;
	}
	.alpinos-row-icon-btn {
		display: inline-flex;
		align-items: center;
		justify-content: center;
		width: 24px;
		height: 24px;
		padding: 0;
		margin: 0 1px;
		border: none;
		background: transparent;
		color: var(--text-muted, #6b7280);
		border-radius: 4px;
		cursor: pointer;
		transition: background-color .12s ease-in-out, color .12s ease-in-out;
	}
	.alpinos-row-icon-btn .fa {
		font-size: 12px;
		line-height: 1;
	}
	.alpinos-row-icon-btn:hover {
		background: rgba(127, 127, 127, 0.15);
		color: var(--text-color, #111827);
	}
	.alpinos-row-icon-btn:focus {
		outline: 2px solid var(--border-color, #cbd5e1);
		outline-offset: 1px;
	}
	.alpinos-row-icon-danger {
		color: #dc2626;
	}
	.alpinos-row-icon-danger:hover {
		background: rgba(220, 38, 38, 0.15);
		color: #dc2626;
	}

	/* Tablet narrow */
	@media (max-width: 720px) {
		.pl-field {
			grid-template-columns: 110px 1fr;
		}
		.pl-field label {
			font-size: 11px;
		}
		/* Bigger touch targets for the row split/remove icons — the central
		   36px control rule only covers .btn and .form-control. */
		.alpinos-row-icon-btn {
			width: 32px;
			height: 32px;
		}
		.alpinos-row-icon-btn .fa {
			font-size: 14px;
		}
	}

	/* Phone — the central alpinos_pages.css already collapses .pl-grid to a
	   single outer column at 768px; here we only stack each label on top of
	   its input. Control height comes from the central 36px touch-target rule. */
	@media (max-width: 480px) {
		.pick-list-container {
			padding: 8px;
		}
		.pl-grid {
			gap: 10px 10px;
		}
		.pl-field {
			grid-template-columns: 1fr;
			gap: 2px;
		}
		.pl-field label {
			text-align: left;
			font-size: 11px;
		}
		.pl-field input,
		.pl-field select {
			font-size: 13px;
			padding: 4px 6px;
		}
	}
</style>

<div class="pick-list-container">
	<div class="pl-actions alp-actions alp-actions--end">
		<button class="btn btn-default btn-sm" id="btn-save-draft" style="display: none;">Save as Draft</button>
		<button class="btn btn-default btn-sm" id="btn-save-draft-update" style="display: none;">Save</button>
		<button class="btn btn-default btn-sm" id="btn-start-picking" style="display: none;">Start Picking</button>
		<button class="btn btn-default btn-sm" id="btn-stop-picking" style="display: none;">Stop Picking</button>
		<button class="btn btn-default btn-sm" id="btn-generate-sticker" style="display: none;">Generate Sticker</button>
		<button class="btn btn-primary btn-sm" id="btn-create-delivery-note" style="display: none;">Create Delivery Note</button>
		<button class="btn btn-default btn-sm" id="btn-go-to-list">Go to List View</button>
	</div>

	<div class="pl-grid">
		<!-- Left column -->
		<div class="pl-col">
			<div class="pl-field">
				<label>Assigned To</label>
				<select class="form-control" data-fieldname="custom_assigned_to"></select>
			</div>
			<div class="pl-field">
				<label>QC Attended By</label>
				<select class="form-control" data-fieldname="custom_qc_attended_by"></select>
			</div>
			<div class="pl-field">
				<label>Created By</label>
				<input type="text" class="form-control" data-fieldname="created_by" readonly>
			</div>
			<div class="pl-field">
				<label>SO Date</label>
				<input type="text" class="form-control" data-fieldname="custom_order_date" readonly>
			</div>
			<div class="pl-field">
				<label>Party Name</label>
				<input type="text" class="form-control" data-fieldname="custom_customer_name" readonly>
			</div>
			<div class="pl-field">
				<label>Party Code</label>
				<input type="text" class="form-control" data-fieldname="custom_party_code" readonly>
			</div>
			<div class="pl-field">
				<label>SO NO.</label>
				<input type="text" class="form-control" data-fieldname="custom_sales_order_id" readonly>
			</div>
			<div class="pl-field">
				<label>PO NO.</label>
				<input type="text" class="form-control" data-fieldname="custom_po_no">
			</div>
			<div class="pl-field">
				<label>Transporter</label>
				<input type="text" class="form-control" data-fieldname="custom_transporter">
			</div>
			<div class="pl-field">
				<label>Gate</label>
				<input type="text" class="form-control" data-fieldname="custom_gate" maxlength="20" placeholder="e.g. A1">
			</div>
		</div>

		<!-- Right column -->
		<div class="pl-col">
			<div class="pl-field">
				<label>Actual Box</label>
				<input type="number" class="form-control" data-fieldname="custom_actual_box" step="1">
			</div>
			<div class="pl-field">
				<label>Sample Box</label>
				<input type="number" class="form-control" data-fieldname="custom_sample_box" step="1">
			</div>
			<div class="pl-field">
				<label>Total Box</label>
				<input type="number" class="form-control" data-fieldname="custom_total_box" step="1" readonly>
			</div>
			<div class="pl-field">
				<label>Sample Weight</label>
				<input type="number" class="form-control" data-fieldname="custom_sample_weight" step="0.01" readonly>
			</div>
			<div class="pl-field">
				<label>Gross Weight</label>
				<input type="number" class="form-control" data-fieldname="custom_gross_weight" step="0.01" readonly>
			</div>
			<div class="pl-field">
				<label>Total Units</label>
				<input type="number" class="form-control" data-fieldname="custom_total_unit" step="0.01" readonly>
			</div>
			<div class="pl-field">
				<label>Dispatch Date</label>
				<input type="date" class="form-control" data-fieldname="custom_dispatch_date">
			</div>
		</div>
	</div>

	<div id="tables-container">
		<!-- Tables will be dynamically generated here -->
	</div>

	<div id="pl-sticker-attachments" style="display:none;">
		<h6 class="alp-section-title">Sticker Attachments</h6>
		<div class="alp-scroll">
			<table class="table table-bordered" style="font-size:13px; margin-bottom:0;">
				<thead><tr><th style="min-width:240px;">File</th><th style="min-width:160px;">Remarks</th></tr></thead>
				<tbody class="pl-sticker-body"></tbody>
			</table>
		</div>
	</div>

	<datalist id="batch-list"></datalist>
</div>
