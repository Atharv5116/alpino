<style>
	/* Card, table, hover, and color styling now comes from the central
	   alpinos_pages.css design system - only page layout rules live here. */
	.dnl-filter-row {
		display: flex;
		flex-wrap: wrap;
		gap: 15px;
		align-items: flex-end;
	}
	.dnl-filter-item {
		flex: 1;
		min-width: 200px;
	}
	.dnl-filter-actions {
		display: flex;
		gap: 10px;
	}
	.dnl-table {
		border-collapse: collapse;
		min-width: 1280px;
	}
	.dnl-table th, .dnl-table td {
		white-space: nowrap;
		padding: 10px 15px;
		vertical-align: middle;
	}
	.dnl-viewbar {
		display: flex;
		flex-wrap: wrap;
		align-items: center;
		gap: 8px;
		margin-bottom: 10px;
	}
	.dnl-viewbar-label {
		font-size: 12px;
		font-weight: 600;
		color: var(--text-muted, #6b7280);
		margin: 0;
	}
	.dnl-pager {
		display: flex;
		flex-wrap: wrap;
		gap: 10px;
		justify-content: space-between;
		align-items: center;
	}
	.dnl-nav {
		display: flex;
		gap: 10px;
		align-items: center;
	}
	.dnl-page-size {
		width: auto;
		display: inline-block;
	}
	@media (max-width: 768px) {
		.dnl-filter-item {
			flex: 1 1 100%;
			min-width: 0;
		}
		.dnl-filter-actions {
			width: 100%;
		}
	}
</style>

<div class="dnl-container">
	<div class="dnl-filters">
		<div class="dnl-filters-title alp-section-title">Filters</div>
		<div class="dnl-filter-row">
			<div class="dnl-filter-item fld-search"></div>
			<div class="dnl-filter-item fld-status"></div>
			<div class="dnl-filter-item fld-company"></div>
			<div class="dnl-filter-actions">
				<button class="btn btn-primary btn-sm btn-dnl-apply">Apply</button>
				<button class="btn btn-default btn-sm btn-dnl-clear">Clear</button>
			</div>
		</div>
	</div>

	<div class="dnl-viewbar">
		<label class="dnl-viewbar-label">Rows per page</label>
		<select class="form-control input-xs dnl-page-size" title="Rows per page">
			<option value="20" selected>20</option>
			<option value="50">50</option>
			<option value="100">100</option>
		</select>
	</div>

	<div class="dnl-table-wrapper alp-scroll">
		<table class="dnl-table">
			<thead>
				<tr>
					<th>ID</th>
					<th>Status</th>
					<th>SO No</th>
					<th>Customer</th>
					<th>Date</th>
					<th>Dispatch Date</th>
					<th>Company</th>
					<th>Transporter</th>
					<th>LR / GR No</th>
					<th>Assigned To</th>
					<th>Total Boxes</th>
				</tr>
			</thead>
			<tbody>
				<!-- Rows -->
			</tbody>
		</table>
	</div>

	<div class="dnl-pager">
		<div class="dnl-count text-muted"></div>
		<div class="dnl-nav">
			<button class="btn btn-default btn-sm btn-dnl-prev">Previous</button>
			<button class="btn btn-default btn-sm btn-dnl-next">Next</button>
		</div>
	</div>
</div>
