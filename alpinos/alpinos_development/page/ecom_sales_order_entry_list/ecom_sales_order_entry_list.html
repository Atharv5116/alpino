<div class="ecom-so-list">
	<div class="eso-list-filters">
		<h6 class="alp-section-title">Filters</h6>
		<div class="row">
			<div class="col-md-3 col-sm-6" style="margin-bottom: 10px;"><div class="fld-search"></div></div>
			<div class="col-md-2 col-sm-6" style="margin-bottom: 10px;"><div class="fld-status"></div></div>
			<div class="col-md-2 col-sm-6" style="margin-bottom: 10px;"><div class="fld-workflow-status"></div></div>
			<div class="col-md-2 col-sm-6" style="margin-bottom: 10px;"><div class="fld-company"></div></div>
			<div class="col-md-2 col-sm-6" style="margin-bottom: 10px;"><div class="fld-customer"></div></div>
			<div class="col-md-2 col-sm-6" style="margin-bottom: 10px;"><div class="fld-from-date"></div></div>
			<div class="col-md-2 col-sm-6" style="margin-bottom: 10px;"><div class="fld-to-date"></div></div>
		</div>
		<div class="alp-actions">
			<button type="button" class="btn btn-primary btn-sm btn-eso-list-apply">Apply</button>
			<button type="button" class="btn btn-default btn-sm btn-eso-list-clear">Clear</button>
		</div>
	</div>

	<div class="alp-card eso-list-table-card">
		<div class="alp-actions eso-list-toolbar" style="justify-content: space-between; align-items: center; margin-bottom: 10px;">
			<span class="text-muted eso-list-count"></span>
			<div>
				<select class="form-control input-xs eso-page-length" title="Rows per page" style="display: inline-block; width: auto; margin-right: 6px; vertical-align: middle;">
					<option value="20" selected>20</option>
					<option value="50">50</option>
					<option value="100">100</option>
				</select>
				<button type="button" class="btn btn-default btn-sm btn-eso-list-prev" disabled>Previous</button>
				<button type="button" class="btn btn-default btn-sm btn-eso-list-next" disabled>Next</button>
			</div>
		</div>
		<div class="alp-scroll alp-scroll--xwide">
			<table class="table table-bordered eso-list-table" style="font-size: 13px; margin-bottom: 0;">
				<thead><tr></tr></thead>
				<tbody></tbody>
			</table>
		</div>
	</div>
</div>
