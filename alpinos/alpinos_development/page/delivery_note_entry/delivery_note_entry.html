<style>
	/* Page gutters + full width come from the central alpinos_pages.css
	   (route delivery_note_entry) - no local padding or max-width here. */
	.dn-header {
		display: grid;
		grid-template-columns: 120px 1fr 120px 1fr;
		gap: 10px;
	}
	.dn-header label {
		font-weight: bold;
		text-align: right;
		padding-right: 8px;
		align-self: center;
		font-size: 12px;
		color: var(--text-muted);
	}
	.dn-header .form-control {
		font-size: 13px;
	}
	.dn-header .dn-field-wide {
		grid-column: span 3;
		resize: vertical;
	}
	@media (max-width: 768px) {
		.dn-header {
			grid-template-columns: 110px 1fr;
		}
		.dn-header label {
			text-align: left;
			padding-right: 0;
		}
		.dn-header .dn-field-wide {
			grid-column: auto;
		}
	}
	@media (max-width: 480px) {
		.dn-header {
			grid-template-columns: 1fr;
			gap: 6px;
		}
		.dn-header label {
			margin-top: 8px;
			font-size: 11px;
		}
	}
	/* Horizontal scroll for the Items table lives on the inner .alp-scroll
	   div (central utility) so the card and its title stay put; the
	   .dn-table-wrapper card itself never scrolls. Card look, sticky thead,
	   zebra and header styling for .dn-table come from alpinos_pages.css. */
	.dn-table {
		width: 100%;
		border-collapse: collapse;
		min-width: 650px;
		font-size: 13px;
	}
	.dn-table th, .dn-table td {
		border: 1px solid var(--border-color, #d1d8dd);
		padding: 6px 8px;
		text-align: center;
	}
	#dn-status-banner.dn-banner-submitted {
		background: var(--bg-green, rgba(46, 125, 50, 0.12));
		color: var(--text-on-green, #2e7d32);
		border: 1px solid var(--bg-green, rgba(46, 125, 50, 0.3));
	}
	#dn-status-banner.dn-banner-cancelled {
		background: var(--bg-red, rgba(198, 40, 40, 0.12));
		color: var(--text-on-red, #c62828);
		border: 1px solid var(--bg-red, rgba(198, 40, 40, 0.3));
	}
	.dn-totals {
		display: grid;
		grid-template-columns: 1fr 1fr 1fr;
		gap: 15px;
		margin-bottom: 20px;
	}
	.dn-totals .total-card {
		text-align: center;
	}
	.dn-totals .total-card .total-label {
		font-size: 11px;
		color: var(--text-muted);
		text-transform: uppercase;
		font-weight: 600;
	}
	.dn-totals .total-card .total-value {
		font-size: 18px;
		font-weight: 700;
		color: var(--text-color);
	}
	@media (max-width: 480px) {
		.dn-totals {
			grid-template-columns: 1fr;
		}
	}
</style>

<div class="dn-container">
	<div class="text-right" style="margin-bottom: 15px;">
		<button class="btn btn-primary btn-sm" id="btn-dn-submit" style="display:none;">Submit</button>
		<button class="btn btn-default btn-sm" id="btn-dn-save" style="display:none;">Save</button>
		<button class="btn btn-default btn-sm" id="btn-dn-print" style="display:none;">Print</button>
		<button class="btn btn-default btn-sm" id="btn-dn-list">List</button>
		<button class="btn btn-default btn-sm" id="btn-dn-back">Back</button>
	</div>

	<div id="dn-status-banner" style="display:none; padding:8px 12px; margin-bottom:12px; border-radius:6px; font-weight:600; font-size:13px;"></div>

	<div class="dn-header">
		<label>DATE</label>
		<input type="text" class="form-control" data-fieldname="posting_date" readonly>
		<label>SO NO.</label>
		<input type="text" class="form-control" data-fieldname="custom_sales_order_id" readonly>

		<label>PICK NO.</label>
		<input type="text" class="form-control" data-fieldname="pick_list_name" readonly>
		<label>LR NO.</label>
		<input type="text" class="form-control" data-fieldname="custom_lr_gr_no">

		<label>CUSTOMER</label>
		<input type="text" class="form-control" data-fieldname="custom_dn_so_customer_name" readonly>
		<label>TRANSPORTER</label>
		<input type="text" class="form-control" data-fieldname="custom_transporter_name" readonly>

		<label>PICKLIST PO NO.</label>
		<input type="text" class="form-control" data-fieldname="vehicle_no" readonly>
		<label>DISPATCH DATE</label>
		<input type="text" class="form-control" data-fieldname="custom_dispatch_date" readonly>

		<label>ASSIGNED TO</label>
		<select class="form-control" data-fieldname="custom_assigned_to"></select>
		<label>CREATED BY</label>
		<input type="text" class="form-control" data-fieldname="created_by" readonly>

		<label>DISPATCH FROM</label>
		<textarea class="form-control dn-field-wide" data-fieldname="custom_dispatch_from" rows="2"></textarea>
	</div>

	<div class="dn-totals">
		<div class="total-card">
			<div class="total-label">Total Boxes</div>
			<div class="total-value" data-fieldname="custom_total_boxes">0</div>
		</div>
		<div class="total-card">
			<div class="total-label">Gross Weight</div>
			<div class="total-value" data-fieldname="custom_dn_order_gross_weight">0</div>
		</div>
		<div class="total-card">
			<div class="total-label">Total Units</div>
			<div class="total-value" data-fieldname="custom_total_units_dn">0</div>
		</div>
	</div>

	<div class="dn-table-wrapper">
		<div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:6px; margin-bottom:10px;">
			<h6 class="alp-section-title" style="margin: 0;">Dispatch To</h6>
			<button type="button" class="btn btn-xs btn-default" id="btn-dn-dispatch-to-add" style="display:none;">+ Add row</button>
		</div>
		<div id="dn-dispatch-to-rows"></div>
	</div>

	<div class="dn-table-wrapper">
		<h6 class="alp-section-title">Items</h6>
		<div class="alp-scroll">
		<table class="dn-table">
			<thead>
				<tr>
					<th>SR.</th>
					<th>SKU</th>
					<th>SKU Name</th>
					<th>QTY</th>
					<th>BOX</th>
					<th>BATCH CODE</th>
					<th>MFG</th>
					<th>EXP</th>
				<th>REMARK</th>
					<th class="dn-col-action" style="display:none;"></th>
				</tr>
			</thead>
			<tbody id="dn-items-body">
			</tbody>
		</table>
		</div>
	</div>
</div>
